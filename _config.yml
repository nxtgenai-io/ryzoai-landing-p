# GitHub Pages Configuration for RyzoAi
title: RyzoAi — WhatsApp + Instagram AI for Indian Businesses
description: AI that automates WhatsApp, Instagram & Google Reviews for Indian businesses. Starting ₹1,499/month.
url: "https://ryzoai.in"
baseurl: ""

# Enable Jekyll for blog
markdown: kramdown
permalink: /blog/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Defaults
defaults:
  - scope:
      path: "blog/_posts"
      type: "posts"
    values:
      layout: "post"

# Exclude files
exclude:
  - README.md
  - "*.sh"
  - "*.ps1"
  - node_modules
